[build-system]
requires = ["hatchling>=1.20"]
build-backend = "hatchling.build"

[project]
name = "hatch-rs-test-project-generated-files"
description = "Generated file artifact test project for hatch-rs"
version = "0.1.0"
requires-python = ">=3.9"
dependencies = [
    "hatchling>=1.20",
    "hatch-rs",
]

[tool.hatch.build.sources]
src = "/"

[tool.hatch.build.targets.sdist]
packages = ["generated_files_project"]

[tool.hatch.build.targets.wheel]
packages = ["generated_files_project"]

[tool.hatch.build.hooks.hatch-rs]
verbose = true
path = "."
module = "generated_files_project"

[[tool.hatch.build.hooks.hatch-rs.artifacts]]
name = "generated-package-files"
command = ["python", "scripts/write_generated_files.py"]
inputs = ["scripts/write_generated_files.py"]

[[tool.hatch.build.hooks.hatch-rs.artifacts.outputs]]
source = "generated_files_project/generated/package.txt"
destination = "generated_files_project/generated/package.txt"
install-scheme = "package"

[[tool.hatch.build.hooks.hatch-rs.artifacts.outputs]]
source = "build/generated/validated.txt"
install-scheme = "validate-only"

[[tool.hatch.build.hooks.hatch-rs.artifacts]]
name = "public-c-header"

[[tool.hatch.build.hooks.hatch-rs.artifacts.outputs]]
source = "generated_files_project/include/generated_files_project.h"
destination = "include/generated_files_project/generated_files_project.h"
install-scheme = "shared-data"
